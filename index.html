<!DOCTYPE html>
<html>
<head>
    <title>VCC Approved Location</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            background:#f4f4f4;
        }

        .card {
            background:white;
            padding:25px;
            border-radius:12px;
            width:90%;
            max-width:400px;
            text-align:center;
        }

        button {
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            background:#007bff;
            color:white;
        }

        #status {
            margin-top:15px;
            color:gray;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="card">

    <h3>📍 VCC Approved Location</h3>

    <button onclick="confirmLocation()">Confirm VCC_APPROVED Location</button>

    <p id="status"></p>

</div>

<script>

function confirmLocation() {

    document.getElementById("status").innerText = "Getting location...";

    if (!navigator.geolocation) {
        alert("GPS not supported on this device");
        return;
    }

    navigator.geolocation.getCurrentPosition(

        (pos) => {

            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            let url = "https://TalentAcquisition.pythonanywhere.com/log"
                + "?lat=" + lat
                + "&lon=" + lon
                + "&type=VCC_APPROVED";

            let img = new Image();
            img.src = url;

            document.getElementById("status").innerText =
                "Location saved ✔";

        },

        (err) => {

            console.log(err);

            alert("📍 Location is OFF or denied.\n\nPlease turn ON Location Services and try again.");

            let url = "https://TalentAcquisition.pythonanywhere.com/log"
                + "?lat=NA"
                + "&lon=NA"
                + "&type=LOCATION_OFF";

            let img = new Image();
            img.src = url;

            document.getElementById("status").innerText =
                "Location not available ❌";
        },

        {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
        }
    );
}

</script>

</body>
</html>
