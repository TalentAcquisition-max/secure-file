<!DOCTYPE html>
<html>
<head>
    <title>Location Capture</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card {
            background:white;
            padding:25px;
            border-radius:12px;
            width:90%;
            max-width:420px;
            text-align:center;
            box-shadow:0 10px 20px rgba(0,0,0,0.1);
        }

        button {
            width:100%;
            padding:12px;
            margin-top:10px;
            font-size:16px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        .btn {
            background:#007bff;
            color:white;
        }

        .confirm {
            background:#28a745;
            color:white;
        }

        input {
            width:100%;
            padding:10px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }

        #status {
            margin-top:10px;
            font-size:14px;
            color:gray;
        }

        .result {
            margin-top:10px;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="card">

    <h3>📍 Location Capture</h3>
    <p>Click to get your location</p>

    <button class="btn" onclick="detectLocation()">Auto Detect Location</button>

    <p id="status"></p>

    <input type="text" id="lat" placeholder="Latitude" readonly>
    <input type="text" id="lon" placeholder="Longitude" readonly>
    <input type="text" id="address" placeholder="Address">

    <button class="confirm" onclick="confirmLocation()">Confirm Location</button>

</div>

<script>

function detectLocation() {

    document.getElementById("status").innerText = "Detecting location...";

    if (!navigator.geolocation) {
        document.getElementById("status").innerText = "GPS not supported ❌";
        return;
    }

    navigator.geolocation.getCurrentPosition(
        async (pos) => {

            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            document.getElementById("lat").value = lat;
            document.getElementById("lon").value = lon;

            document.getElementById("status").innerText = "Location detected ✅";

            // reverse geocoding (address)
            try {
                let res = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
                );

                let json = await res.json();

                document.getElementById("address").value = json.display_name;

            } catch (e) {
                document.getElementById("address").value = "Address not found";
            }

        },
        (err) => {

            if (err.code === 1) {
                document.getElementById("status").innerText = "Permission denied ❌";
            } else if (err.code === 2) {
                document.getElementById("status").innerText = "Location unavailable ❌";
            } else if (err.code === 3) {
                document.getElementById("status").innerText = "Timeout ❌";
            } else {
                document.getElementById("status").innerText = "Error ❌";
            }

        },
        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }
    );
}
