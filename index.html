<!DOCTYPE html>
<html>
<head>
    <title>Location Capture</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card {
            background:white;
            padding:25px;
            border-radius:12px;
            width:90%;
            max-width:420px;
            text-align:center;
            box-shadow:0 10px 20px rgba(0,0,0,0.1);
        }

        button {
            width:100%;
            padding:12px;
            margin-top:10px;
            font-size:16px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        .btn {
            background:#007bff;
            color:white;
        }

        input {
            width:100%;
            padding:10px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }

        #status {
            margin-top:10px;
            font-size:14px;
            color:gray;
        }
    </style>
</head>
<body>

<div class="card">

    <h3>📍 Location Detector</h3>

    <button class="btn" onclick="getLocation()">Get Location</button>

    <p id="status"></p>

    <input type="text" id="lat" placeholder="Latitude" readonly>
    <input type="text" id="lon" placeholder="Longitude" readonly>
    <input type="text" id="address" placeholder="Address">

</div>

<script>

function getLocation() {

    document.getElementById("status").innerText = "Getting location...";

    if (!navigator.geolocation) {
        document.getElementById("status").innerText = "GPS not supported";
        return;
    }

    navigator.geolocation.getCurrentPosition(
        async (pos) => {

            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            document.getElementById("lat").value = lat;
            document.getElementById("lon").value = lon;

            document.getElementById("status").innerText = "Location received";

            // reverse geocode (this gives Mallikarjuna Pet / Sarada Colony etc.)
            try {
                let res = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
                );

                let data = await res.json();

                document.getElementById("address").value =
                    data.display_name || "No address found";

            } catch (e) {
                document.getElementById("address").value = "Error fetching address";
            }

        },
        (err) => {

            document.getElementById("status").innerText =
                "Permission denied or GPS error";

        },
        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }
    );
}

</script>

</body>
</html>
