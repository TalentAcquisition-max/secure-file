<!DOCTYPE html>
<html>
<head>
    <title>Location Picker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card {
            background:white;
            padding:25px;
            border-radius:12px;
            width:90%;
            max-width:420px;
            text-align:center;
            box-shadow:0 10px 20px rgba(0,0,0,0.1);
        }

        button {
            width:100%;
            padding:12px;
            margin-top:10px;
            font-size:16px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        .btn {
            background:#007bff;
            color:white;
        }

        .confirm {
            background:#28a745;
            color:white;
        }

        input {
            width:100%;
            padding:10px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }

        #status {
            margin-top:10px;
            font-size:14px;
            color:gray;
        }
    </style>
</head
