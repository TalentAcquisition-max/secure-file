<!DOCTYPE html>
<html>
<head>
    <title>Location</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
        .box { background:white; padding:20px; border-radius:10px; width:90%; max-width:400px; text-align:center; }
        button { padding:12px; width:100%; margin-top:10px; border:none; border-radius:8px; background:#007bff; color:white; }
        input { width:100%; margin-top:10px; padding:10px; border:1px solid #ccc; border-radius:6px; }
        #status { margin-top:10px; color:gray; }
    </style>
</head>
<body>

<div class="box">
    <h3>Get Location</h3>

    <button onclick="getLoc()">Detect</button>

    <p id="status"></p>

    <input id="lat" placeholder="Latitude" readonly>
    <input id="lon" placeholder="Longitude" readonly>
    <input id="addr" placeholder="Address">

</div>

<script>

function getLoc() {

    document.getElementById("status").innerText = "Getting location...";

    navigator.geolocation.getCurrentPosition(
        async (pos) => {

            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            document.getElementById("lat").value = lat;
            document.getElementById("lon").value = lon;

            document.getElementById("status").innerText = "Done";

            try {
                let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                let json = await res.json();

                document.getElementById("addr").value = json.display_name;

            } catch (e) {
                document.getElementById("addr").value = "Address error";
            }

        },
        () => {
            document.getElementById("status").innerText = "Allow location permission";
        },
        { enableHighAccuracy: true, timeout: 10000 }
    );
}

</script>

</body>
</html>
